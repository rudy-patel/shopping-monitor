name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SCRAPER_MODE: fixtures

jobs:
  backend-lint-migration:
    name: Backend Lint & Migration Safety
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Ruff critical checks
        run: ruff check . --select E9,F63,F7,F82,F401

      - name: Validate migration naming and docs coverage
        run: python scripts/check_migrations.py
        working-directory: ${{ github.workspace }}

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      SUPABASE_URL: ""
      SUPABASE_ANON_KEY: ""
      SUPABASE_SERVICE_ROLE_KEY: ""
      AUTH_BYPASS_ENABLED: "true"
      GEMINI_API_KEY: ""

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Assert SCRAPER_MODE=fixtures # pragma: allowlist secret
        run: test "$SCRAPER_MODE" = "fixtures" # pragma: allowlist secret

      - name: Assert GEMINI_API_KEY unset in CI
        run: test -z "$GEMINI_API_KEY"

      - name: Run tests
        run: python -m pytest test/ -v --tb=short -m "not integration"

  frontend-quality:
    name: Frontend Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test:run

      - name: Run production build
        run: npm run build

  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    env:
      SCRAPER_MODE: fixtures
      AUTH_BYPASS_ENABLED: "true"
      GEMINI_API_KEY: ""
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      PLAYWRIGHT_API_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v5

      - name: Check Supabase credentials
        id: supabase
        run: |
          if [ -n "$SUPABASE_URL" ] || { [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_PROJECT_REF" ]; }; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Skipping Playwright e2e — configure SUPABASE_URL/ANON/SERVICE_ROLE or SUPABASE_ACCESS_TOKEN + SUPABASE_PROJECT_REF in GitHub Actions secrets."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.supabase.outputs.ready == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend virtualenv
        if: steps.supabase.outputs.ready == 'true'
        run: python -m venv venv && . venv/bin/activate && pip install -r requirements.txt
        working-directory: backend

      - name: Sync backend/.env for e2e
        if: steps.supabase.outputs.ready == 'true'
        run: backend/venv/bin/python scripts/setup_integration_env.py

      - name: Set up Node.js
        if: steps.supabase.outputs.ready == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.supabase.outputs.ready == 'true'
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        if: steps.supabase.outputs.ready == 'true'
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run Playwright e2e tests
        if: steps.supabase.outputs.ready == 'true'
        run: npx playwright test
        working-directory: frontend
